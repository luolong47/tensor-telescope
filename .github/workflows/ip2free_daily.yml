name: IP2Free 每日自动领取奖励

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  claim_reward:
    runs-on: ubuntu-latest
    name: 执行领取奖励任务

    steps:
      - name: 获取项目代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 缓存 Python 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/claim_reward.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 缓存 Token
        uses: actions/cache@v4
        with:
          path: token_cache.txt
          key: ${{ runner.os }}-ip2free-token-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ip2free-token-

      - name: 安装 Python 依赖
        run: |
          pip install ddddocr requests

      - name: 执行领取脚本
        env:
          EMAIL: ${{ vars.IP2FREE_EMAIL }}
          PASSWORD: ${{ secrets.IP2FREE_PASSWORD }}
          UA: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
        run: python claim_reward.py
